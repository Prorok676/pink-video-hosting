<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка видео - Тикиток</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080b;
            --surface: #131318;
            --border: #23232a;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #ec4899;
            --accent-dark: #be185d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }

        /* Частицы фона */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--accent);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .auth-card {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .auth-header {
            background: linear-gradient(135deg, #1c0a14 0%, #1a0e18 100%);
            padding: 32px 28px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .auth-header .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 30%, #db2777 60%, #f472b6 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            text-transform: lowercase;
            animation: gradientMove 4s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .auth-header p {
            color: #f472b6;
            font-size: 0.9rem;
            margin-top: 6px;
            font-weight: 450;
        }

        .auth-body {
            padding: 30px 28px 24px;
        }

        .auth-body label {
            font-weight: 550;
            font-size: 0.88rem;
            color: #d4d4d8;
            margin-bottom: 5px;
            display: block;
        }

        .auth-body input,
        .auth-body textarea,
        .auth-body select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            background: #0d0d12;
            color: var(--text);
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
        }

        .auth-body textarea {
            resize: vertical;
            min-height: 100px;
        }

        .auth-body input:focus,
        .auth-body textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.15);
            background: #111116;
        }

        .helptext {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: -10px;
            margin-bottom: 14px;
            display: block;
            line-height: 1.4;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            color: white;
            border: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: -0.2px;
            margin-top: 6px;
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.2);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #db2777 0%, #9d174d 100%);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.4);
            transform: translateY(-2px);
        }

        .back-link {
            text-align: center;
            margin-top: 18px;
            display: block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .back-link:hover {
            color: #f472b6;
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">тикиток</div>
            <p>Загрузить новое видео</p>
        </div>

        <div class="auth-body">
            <form method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">Загрузить</button>
            </form>
        </div>

        <a href="{% url 'home' %}" class="back-link">На главную</a>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 8 + 6 + 's';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>

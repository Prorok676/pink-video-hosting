<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Тикиток</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ec4899;
            --accent-dark: #be185d;
            --border: #f3f4f6;
            --text: #1a1a1a;
            --text-secondary: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 8px 20px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            padding: 32px 28px;
            text-align: center;
            border-bottom: 2px solid #f9a8d4;
        }

        .auth-header .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-dark);
            letter-spacing: -0.5px;
            text-transform: lowercase;
        }

        .auth-header p {
            color: #9d174d;
            font-size: 0.9rem;
            margin-top: 4px;
            font-weight: 450;
        }

        .auth-body {
            padding: 30px 28px 24px;
        }

        .auth-body label {
            font-weight: 550;
            font-size: 0.88rem;
            color: var(--text);
            margin-bottom: 5px;
            display: block;
        }

        .auth-body input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid #e5e7eb;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            background: #f9fafb;
            margin-bottom: 16px;
        }

        .auth-body input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.08);
            background: white;
        }

        .errorlist {
            list-style: none;
            padding: 0;
            margin-bottom: 12px;
        }

        .errorlist li {
            font-size: 0.8rem;
            color: #dc2626;
            background: #fef2f2;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: -0.2px;
            margin-top: 6px;
        }

        .btn-submit:hover {
            background: var(--accent-dark);
            box-shadow: 0 6px 20px rgba(190, 24, 93, 0.25);
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            padding: 0 28px 26px;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 18px;
            display: block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--accent-dark);
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">тикиток</div>
            <p>Войти в аккаунт</p>
        </div>

        <div class="auth-body">
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">Войти</button>
            </form>
        </div>

        <div class="auth-footer">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>

        <a href="{% url 'home' %}" class="back-link">На главную</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Тикиток</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080b;
            --surface: #131318;
            --border: #23232a;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #ec4899;
            --accent-dark: #be185d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }

        .auth-card {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-header {
            background: linear-gradient(135deg, #1c0a14 0%, #1a0e18 100%);
            padding: 32px 28px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .auth-header .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f472b6 0%, #ec4899 30%, #db2777 60%, #f472b6 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            text-transform: lowercase;
            animation: gradientMove 4s ease-in-out infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .auth-header p {
            color: #f472b6;
            font-size: 0.9rem;
            margin-top: 6px;
            font-weight: 450;
        }

        .auth-body {
            padding: 30px 28px 24px;
        }

        .auth-body label {
            font-weight: 550;
            font-size: 0.88rem;
            color: #d4d4d8;
            margin-bottom: 5px;
            display: block;
        }

        .auth-body input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            background: #0d0d12;
            color: var(--text);
            margin-bottom: 16px;
        }

        .auth-body input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.15);
            background: #111116;
        }

        .helptext {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: -10px;
            margin-bottom: 14px;
            display: block;
            line-height: 1.4;
        }

        .errorlist {
            list-style: none;
            padding: 0;
            margin-bottom: 12px;
        }

        .errorlist li {
            font-size: 0.8rem;
            color: #f87171;
            background: rgba(248, 113, 113, 0.08);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            border-left: 2px solid #ef4444;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            color: white;
            border: none;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: -0.2px;
            margin-top: 6px;
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.2);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #db2777 0%, #9d174d 100%);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.4);
            transform: translateY(-2px);
        }

        .auth-footer {
            text-align: center;
            padding: 0 28px 26px;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: # f472b6;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 18px;
            display: block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
        }

        .back-link:hover {
            color: #f472b6;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">тикиток</div>
            <p>Создать новый аккаунт</p>
        </div>

        <div class="auth-body">
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">Зарегистрироваться</button>
            </form>
        </div>

        <div class="auth-footer">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </div>

        <a href="{% url 'home' %}" class="back-link">На главную</a>
    </div>

</body>
</html>
